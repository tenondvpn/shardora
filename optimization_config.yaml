# Shardora Blockchain Optimization Configuration
# ==========================================
# This configuration file controls all aspects of the automated optimization suite

# Build Configuration
build:
  type: "Release"                    # Build type: Debug, Release, RelWithDebInfo
  optimization_level: "O3"           # Compiler optimization level: O0, O1, O2, O3, Ofast
  enable_lto: true                   # Enable Link Time Optimization
  enable_native_arch: true           # Enable native architecture optimizations (-march=native)
  parallel_jobs: 8                   # Number of parallel build jobs (0 = auto-detect)
  enable_tcmalloc: true              # Enable TCMalloc high-performance memory allocator
  enable_profiling: false            # Enable profiling support
  enable_sanitizers: false           # Enable AddressSanitizer/ThreadSanitizer
  custom_flags: []                   # Additional custom compiler flags

# Testing Configuration
testing:
  unit_tests: true                   # Run unit tests
  integration_tests: true            # Run integration tests
  performance_tests: true            # Run performance benchmarks
  regression_tests: true             # Run regression tests
  coverage_threshold: 95.0           # Minimum code coverage percentage
  performance_threshold: 0.95       # Performance regression threshold (95% of baseline)
  test_timeout: 300                  # Test timeout in seconds
  parallel_test_execution: true      # Run tests in parallel
  generate_html_reports: true        # Generate HTML test reports

# Performance Configuration
performance:
  benchmark_iterations: 1000         # Number of benchmark iterations
  stress_test_duration: 300          # Stress test duration in seconds
  memory_limit_mb: 4096              # Memory limit for tests in MB
  cpu_limit_percent: 90.0            # CPU usage limit percentage
  enable_profiling: true             # Enable performance profiling
  profile_duration: 60               # Profiling duration in seconds
  enable_flamegraph: true            # Generate flame graphs
  benchmark_categories:              # Categories of benchmarks to run
    - "cryptographic"
    - "consensus"
    - "transaction"
    - "database"
    - "network"

# Quality Assurance Configuration
quality:
  static_analysis: true              # Run static code analysis
  code_formatting_check: true       # Check code formatting
  documentation_check: true         # Check documentation completeness
  security_scan: true               # Run security vulnerability scan
  dependency_check: true            # Check for vulnerable dependencies
  license_check: true               # Check license compliance
  complexity_threshold: 15          # Maximum cyclomatic complexity
  duplication_threshold: 5          # Maximum code duplication percentage

# Deployment Configuration
deployment:
  docker_enabled: true               # Enable Docker containerization
  kubernetes_enabled: false         # Enable Kubernetes deployment
  monitoring_enabled: true          # Enable monitoring and alerting
  auto_scaling: true                # Enable auto-scaling
  health_checks: true               # Enable health check endpoints
  backup_enabled: true              # Enable automated backups
  rollback_enabled: true            # Enable automated rollback
  blue_green_deployment: false      # Enable blue-green deployment

# Monitoring Configuration
monitoring:
  metrics_collection: true          # Enable metrics collection
  log_aggregation: true             # Enable log aggregation
  alerting: true                    # Enable alerting
  dashboard: true                   # Enable monitoring dashboard
  retention_days: 30                # Metrics retention period
  alert_thresholds:
    cpu_percent: 80.0               # CPU usage alert threshold
    memory_percent: 85.0            # Memory usage alert threshold
    disk_percent: 90.0              # Disk usage alert threshold
    error_rate: 1.0                 # Error rate alert threshold (%)
    response_time_ms: 1000          # Response time alert threshold

# Notification Configuration
notifications:
  enabled: true                     # Enable notifications
  email:
    enabled: false                  # Enable email notifications
    smtp_server: ""                 # SMTP server
    recipients: []                  # Email recipients
  slack:
    enabled: false                  # Enable Slack notifications
    webhook_url: ""                 # Slack webhook URL
    channel: "#shardora-optimization"   # Slack channel
  discord:
    enabled: false                  # Enable Discord notifications
    webhook_url: ""                 # Discord webhook URL

# Security Configuration
security:
  vulnerability_scanning: true      # Enable vulnerability scanning
  dependency_scanning: true         # Enable dependency vulnerability scanning
  secrets_scanning: true           # Enable secrets scanning
  code_signing: false              # Enable code signing
  secure_build: true               # Enable secure build practices
  audit_logging: true              # Enable audit logging

# Advanced Configuration
advanced:
  experimental_features: false      # Enable experimental features
  debug_mode: false                 # Enable debug mode
  verbose_logging: false            # Enable verbose logging
  cache_enabled: true               # Enable build and test caching
  cache_size_mb: 2048              # Cache size limit in MB
  parallel_analysis: true          # Enable parallel analysis
  memory_optimization: true        # Enable memory optimizations
  cpu_optimization: true           # Enable CPU optimizations

# Environment-Specific Overrides
environments:
  development:
    build:
      type: "Debug"
      enable_sanitizers: true
    testing:
      coverage_threshold: 90.0
    advanced:
      debug_mode: true
      verbose_logging: true
  
  staging:
    build:
      type: "RelWithDebInfo"
    testing:
      coverage_threshold: 95.0
    monitoring:
      retention_days: 7
  
  production:
    build:
      type: "Release"
      enable_lto: true
    testing:
      coverage_threshold: 98.0
    monitoring:
      retention_days: 90
    security:
      code_signing: true
      audit_logging: true

# Custom Scripts and Hooks
hooks:
  pre_build: []                     # Scripts to run before build
  post_build: []                    # Scripts to run after build
  pre_test: []                      # Scripts to run before tests
  post_test: []                     # Scripts to run after tests
  pre_deploy: []                    # Scripts to run before deployment
  post_deploy: []                   # Scripts to run after deployment

# Resource Limits
limits:
  build_timeout: 1800               # Build timeout in seconds
  test_timeout: 3600                # Total test timeout in seconds
  analysis_timeout: 1800            # Analysis timeout in seconds
  max_memory_gb: 16                 # Maximum memory usage in GB
  max_disk_gb: 100                  # Maximum disk usage in GB
  max_cpu_cores: 16                 # Maximum CPU cores to use

# Reporting Configuration
reporting:
  generate_reports: true            # Generate comprehensive reports
  report_formats:                   # Report formats to generate
    - "html"
    - "json"
    - "xml"
    - "markdown"
  include_charts: true              # Include performance charts
  include_trends: true              # Include trend analysis
  archive_reports: true             # Archive historical reports
  report_retention_days: 90         # Report retention period